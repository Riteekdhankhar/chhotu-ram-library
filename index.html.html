<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhotu Ram Library</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --primary: #2ecc71;
            --secondary: #3498db;
            --dark-blue: #2c3e50;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #1a1a1a;
            --primary: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: all 0.3s ease;
            text-align: center;
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .hidden { display: none; }
        
        /* UI Elements */
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-back { background: #7f8c8d; }
        .btn-admin { background: var(--dark-blue); }
        .btn-student { background: var(--primary); }
        .btn-print { background: #9b59b6; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .book-img { width: 100px; height: 140px; object-fit: cover; border-radius: 5px; }
        .success-tick { color: var(--primary); font-size: 50px; display: block; margin: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card-bg); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }

        /* Print Specific Styles */
        @media print {
            .btn, .btn-back, input, .nav-header, h2, h3:not(.print-title) { display: none !important; }
            .container { width: 100%; max-width: 100%; }
            table { width: 100%; border: 1px solid black; }
            th, td { border: 1px solid black; color: black; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body data-theme="light">

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <div class="container">
        <div id="page-landing">
            <h1>Chhotu Ram Library</h1>
            <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" width="100" alt="Logo">
            <div style="margin-top: 30px;">
                <button class="btn btn-admin" onclick="showPage('page-login')">1. ADMIN</button>
                <button class="btn btn-student" onclick="showStudentPage()">2. STUDENT</button>
            </div>
        </div>

        <div id="page-login" class="hidden">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Password" onclick="playClick()">
            <br>
            <button class="btn btn-back" onclick="showPage('page-landing')">Back</button>
            <button class="btn" onclick="checkPassword()">Login</button>
            <div id="login-status"></div>
        </div>

        <div id="page-admin-dash" class="hidden">
            <h2>Admin Dashboard</h2>
            <button class="btn" onclick="showPage('page-upload')">1. Upload Book</button>
            <button class="btn" onclick="showDeletePage()">2. Delete Book</button>
            <button class="btn" onclick="showIssuePage()">3. Student Records</button>
            <button class="btn" onclick="showPage('page-settings')">4. Settings</button>
            <br>
            <button class="btn btn-back" onclick="showPage('page-landing')">Logout</button>
        </div>

        <div id="page-upload" class="hidden">
            <h3>Upload New Book</h3>
            <input type="text" id="bookName" placeholder="Book Name" onclick="playClick()">
            <input type="text" id="authName" placeholder="Author Name" onclick="playClick()">
            <input type="number" id="bookStock" placeholder="Stock Quantity" onclick="playClick()">
            <input type="file" id="bookPic" accept="image/*" onclick="playClick()">
            <br>
            <button class="btn btn-back" onclick="showPage('page-admin-dash')">Back</button>
            <button class="btn" onclick="saveBook()">Save Book</button>
        </div>

        <div id="page-delete" class="hidden">
            <h3>Delete Books</h3>
            <div id="delete-list"></div>
            <button class="btn btn-back" onclick="showPage('page-admin-dash')">Back</button>
        </div>

        <div id="page-issue" class="hidden">
            <h3 class="print-title">Chhotu Ram Library - Student Issue Records</h3>
            <div class="card">
                <input type="text" id="sName" placeholder="Student Name" onclick="playClick()">
                <input type="text" id="sFather" placeholder="Father Name" onclick="playClick()">
                <input type="text" id="sClass" placeholder="Class/Section" onclick="playClick()">
                <input type="text" id="sRoll" placeholder="Roll No" onclick="playClick()">
                <input type="text" id="sBook" placeholder="Book Name" onclick="playClick()">
                <button class="btn" onclick="issueBook()">Add Record</button>
            </div>
            <button class="btn btn-print" onclick="printRecords()">🖨️ Print Records</button>
            <table id="issue-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Book</th>
                        <th>Returned?</th>
                        <th class="btn-hide">Action</th>
                    </tr>
                </thead>
                <tbody id="issue-list"></tbody>
            </table>
            <br>
            <button class="btn btn-back" onclick="showPage('page-admin-dash')">Back</button>
        </div>

        <div id="page-settings" class="hidden">
            <h3>Settings</h3>
            <div class="card">
                <h4>Change Password</h4>
                <input type="password" id="currPass" placeholder="Current Password" onclick="playClick()">
                <input type="password" id="newPass" placeholder="New Password" onclick="playClick()">
                <button class="btn" onclick="changePassword()">Update Password</button>
            </div>
            <div class="card">
                <h4>Theme</h4>
                <button class="btn" onclick="setTheme('dark')">Dark Mode</button>
                <button class="btn" onclick="setTheme('light')">Day Mode</button>
            </div>
            <button class="btn btn-back" onclick="showPage('page-admin-dash')">Back</button>
        </div>

        <div id="page-student" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Library Catalog</h3>
                <div>
                    <button class="btn" style="padding: 5px 10px;" onclick="setTheme('light')">☀️</button>
                    <button class="btn" style="padding: 5px 10px; background: black;" onclick="setTheme('dark')">🌙</button>
                </div>
            </div>
            <input type="text" id="searchBar" placeholder="Search books by name..." onkeyup="searchBooks()" onclick="playClick()">
            <div id="student-book-list"></div>
            <button class="btn btn-back" onclick="showPage('page-landing')">Back</button>
        </div>
    </div>

    <script>
        // Data Persistence
        let books = JSON.parse(localStorage.getItem('books')) || [];
        let issues = JSON.parse(localStorage.getItem('issues')) || [];
        let adminPass = localStorage.getItem('adminPass') || "chhotu ram 2026";

        function playClick() {
            const sound = document.getElementById('clickSound');
            sound.currentTime = 0; 
            sound.play();
        }

        function showPage(pageId) {
            playClick();
            document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
        }

        // --- ADMIN AUTH ---
        function checkPassword() {
            playClick();
            const val = document.getElementById('adminPass').value;
            if(val === adminPass) {
                document.getElementById('login-status').innerHTML = '<span class="success-tick">✔ Correct</span>';
                setTimeout(() => {
                    document.getElementById('adminPass').value = "";
                    document.getElementById('login-status').innerHTML = "";
                    showPage('page-admin-dash');
                }, 2000);
            } else {
                alert("Wrong Password!");
            }
        }

        // --- BOOK MANAGEMENT ---
        function saveBook() {
            playClick();
            const name = document.getElementById('bookName').value;
            const auth = document.getElementById('authName').value;
            const stock = document.getElementById('bookStock').value;
            const fileInput = document.getElementById('bookPic');
            
            if(!name || !fileInput.files[0]) return alert("Please provide book name and image");

            const reader = new FileReader();
            reader.onload = function(e) {
                books.push({ id: Date.now(), name, auth, stock, img: e.target.result });
                localStorage.setItem('books', JSON.stringify(books));
                alert("Book Uploaded Successfully!");
                showPage('page-admin-dash');
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function showDeletePage() {
            const list = document.getElementById('delete-list');
            list.innerHTML = "";
            books.forEach(book => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${book.img}" class="book-img"><br>
                        <b>${book.name}</b><br>
                        <button class="btn" style="background:#e74c3c" onclick="deleteBook(${book.id})">Delete Forever</button>
                    </div>`;
            });
            showPage('page-delete');
        }

        function deleteBook(id) {
            playClick();
            books = books.filter(b => b.id !== id);
            localStorage.setItem('books', JSON.stringify(books));
            showDeletePage();
        }

        // --- ISSUE & PRINT RECORDS ---
        function issueBook() {
            playClick();
            const name = document.getElementById('sName').value;
            const book = document.getElementById('sBook').value;
            if(!name || !book) return alert("Fill Student Name and Book Name");

            issues.push({ name, book, returned: "No" });
            localStorage.setItem('issues', JSON.stringify(issues));
            showIssuePage();
        }

        function showIssuePage() {
            const list = document.getElementById('issue-list');
            list.innerHTML = "";
            issues.forEach((iss, index) => {
                list.innerHTML += `
                    <tr>
                        <td>${iss.name}</td>
                        <td>${iss.book}</td>
                        <td><b style="color:${iss.returned==='Yes'?'green':'red'}">${iss.returned}</b></td>
                        <td class="btn-hide">
                            <button onclick="toggleReturn(${index})">Toggle Yes/No</button>
                            <button onclick="deleteRecord(${index})" style="color:red">X</button>
                        </td>
                    </tr>`;
            });
            showPage('page-issue');
        }

        function toggleReturn(index) {
            playClick();
            issues[index].returned = issues[index].returned === "Yes" ? "No" : "Yes";
            localStorage.setItem('issues', JSON.stringify(issues));
            showIssuePage();
        }

        function deleteRecord(index) {
            playClick();
            issues.splice(index, 1);
            localStorage.setItem('issues', JSON.stringify(issues));
            showIssuePage();
        }

        function printRecords() {
            playClick();
            window.print();
        }

        // --- SETTINGS & THEMES ---
        function setTheme(mode) {
            playClick();
            document.body.setAttribute('data-theme', mode);
        }

        function changePassword() {
            playClick();
            const curr = document.getElementById('currPass').value;
            const np = document.getElementById('newPass').value;
            if(curr === adminPass) {
                adminPass = np;
                localStorage.setItem('adminPass', np);
                alert("Password Changed Successfully!");
            } else {
                alert("Current Password Incorrect");
            }
        }

        // --- STUDENT SEARCH ---
        function showStudentPage() {
            renderStudentBooks(books);
            showPage('page-student');
        }

        function renderStudentBooks(data) {
            const container = document.getElementById('student-book-list');
            container.innerHTML = "";
            data.forEach(book => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${book.img}" class="book-img">
                        <h4>${book.name}</h4>
                        <p>Author: ${book.auth} | Stock: ${book.stock}</p>
                    </div>`;
            });
        }

        function searchBooks() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = books.filter(b => b.name.toLowerCase().includes(term));
            renderStudentBooks(filtered);
        }
    </script>
</body>
</html>
